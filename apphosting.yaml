runConfig:
  runtime: nodejs20
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  minInstances: 0
  maxInstances: 10

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://frankwilsondigital.co.za
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY
    secret: NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_GCAL_LINK_ZA
    value: ""  # TODO: Add SA Google Calendar appointment scheduling URL
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_GCAL_LINK_INTERNATIONAL
    value: ""  # TODO: Add international Google Calendar appointment scheduling URL
    availability:
      - BUILD
      - RUNTIME

  # Server-side secrets — never exposed to the browser
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: RESEND_FROM_EMAIL
    value: hello@frankwilsondigital.co.za
    availability:
      - RUNTIME

  - variable: RESEND_DEMO_NOTIFY_EMAIL
    value: admin@frankwilsondigital.co.za
    availability:
      - RUNTIME

  - variable: PAYSTACK_SECRET_KEY
    secret: PAYSTACK_SECRET_KEY
    availability:
      - RUNTIME

  - variable: PAYSTACK_WEBHOOK_SECRET
    secret: PAYSTACK_WEBHOOK_SECRET
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_TURNSTILE_SITE_KEY
    secret: NEXT_PUBLIC_TURNSTILE_SITE_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: TURNSTILE_SECRET_KEY
    secret: TURNSTILE_SECRET_KEY
    availability:
      - RUNTIME
